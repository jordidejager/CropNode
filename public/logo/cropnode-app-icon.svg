<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Dark base gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0f2318"/>
      <stop offset="55%" stop-color="#081611"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Emerald glow halo behind logo -->
    <radialGradient id="glowHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#10b981" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <!-- Line gradient -->
    <linearGradient id="lineGradApp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="35%" stop-color="#34d399"/>
      <stop offset="70%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Central hub gradient -->
    <radialGradient id="coreDotApp" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="35%" stop-color="#6ee7b7"/>
      <stop offset="75%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>

    <filter id="softGlowApp" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Ambient halo behind logo -->
  <circle cx="512" cy="512" r="340" fill="url(#glowHalo)"/>

  <!-- LOTS of small subtle scattered background data-dots -->
  <g>
    <!-- Group 1: brighter, slightly larger -->
    <g opacity="0.45" fill="#34d399">
      <circle cx="87" cy="134" r="3"/>
      <circle cx="903" cy="178" r="4"/>
      <circle cx="156" cy="892" r="3"/>
      <circle cx="832" cy="941" r="3"/>
      <circle cx="412" cy="67" r="2.5"/>
      <circle cx="634" cy="982" r="3"/>
      <circle cx="52" cy="451" r="3"/>
      <circle cx="968" cy="523" r="3.5"/>
      <circle cx="276" cy="204" r="2.5"/>
      <circle cx="748" cy="286" r="3"/>
      <circle cx="368" cy="808" r="3"/>
      <circle cx="672" cy="712" r="2.5"/>
    </g>

    <!-- Group 2: emerald, small -->
    <g opacity="0.4" fill="#10b981">
      <circle cx="142" cy="302" r="2"/>
      <circle cx="862" cy="392" r="2.5"/>
      <circle cx="224" cy="562" r="2"/>
      <circle cx="782" cy="634" r="2.5"/>
      <circle cx="312" cy="123" r="2"/>
      <circle cx="692" cy="152" r="2"/>
      <circle cx="98" cy="684" r="2.5"/>
      <circle cx="912" cy="741" r="2"/>
      <circle cx="438" cy="892" r="2.5"/>
      <circle cx="568" cy="43" r="2"/>
      <circle cx="186" cy="758" r="2"/>
      <circle cx="818" cy="103" r="2.5"/>
      <circle cx="332" cy="952" r="2"/>
      <circle cx="712" cy="866" r="2.5"/>
    </g>

    <!-- Group 3: light mint, tiny -->
    <g opacity="0.35" fill="#6ee7b7">
      <circle cx="68" cy="241" r="1.8"/>
      <circle cx="932" cy="287" r="1.5"/>
      <circle cx="201" cy="812" r="1.8"/>
      <circle cx="799" cy="851" r="1.5"/>
      <circle cx="352" cy="33" r="1.8"/>
      <circle cx="642" cy="87" r="1.5"/>
      <circle cx="122" cy="571" r="1.8"/>
      <circle cx="878" cy="611" r="1.5"/>
      <circle cx="389" cy="212" r="1.8"/>
      <circle cx="611" cy="272" r="1.5"/>
      <circle cx="287" cy="451" r="1.8"/>
      <circle cx="713" cy="491" r="1.5"/>
      <circle cx="456" cy="782" r="1.8"/>
      <circle cx="544" cy="832" r="1.5"/>
      <circle cx="234" cy="348" r="1.8"/>
      <circle cx="766" cy="398" r="1.5"/>
    </g>

    <!-- Group 4: very tiny, high density -->
    <g opacity="0.3" fill="#34d399">
      <circle cx="164" cy="52" r="1.2"/>
      <circle cx="836" cy="72" r="1"/>
      <circle cx="52" cy="362" r="1.2"/>
      <circle cx="972" cy="402" r="1"/>
      <circle cx="248" cy="712" r="1.2"/>
      <circle cx="752" cy="752" r="1"/>
      <circle cx="392" cy="962" r="1.2"/>
      <circle cx="608" cy="952" r="1"/>
      <circle cx="112" cy="842" r="1.2"/>
      <circle cx="888" cy="862" r="1"/>
      <circle cx="524" cy="12" r="1.2"/>
      <circle cx="476" cy="1012" r="1"/>
      <circle cx="32" cy="582" r="1.2"/>
      <circle cx="992" cy="592" r="1"/>
      <circle cx="210" cy="172" r="1.2"/>
      <circle cx="792" cy="212" r="1"/>
      <circle cx="134" cy="432" r="1.2"/>
      <circle cx="866" cy="462" r="1"/>
      <circle cx="58" cy="752" r="1.2"/>
      <circle cx="942" cy="792" r="1"/>
      <circle cx="344" cy="612" r="1.2"/>
      <circle cx="656" cy="642" r="1"/>
      <circle cx="182" cy="912" r="1.2"/>
      <circle cx="818" cy="932" r="1"/>
    </g>

    <!-- Group 5: emerald tiny -->
    <g opacity="0.25" fill="#10b981">
      <circle cx="294" cy="87" r="1"/>
      <circle cx="706" cy="112" r="0.9"/>
      <circle cx="74" cy="512" r="1"/>
      <circle cx="948" cy="542" r="0.9"/>
      <circle cx="376" cy="352" r="1"/>
      <circle cx="624" cy="392" r="0.9"/>
      <circle cx="264" cy="632" r="1"/>
      <circle cx="736" cy="662" r="0.9"/>
      <circle cx="416" cy="52" r="1"/>
      <circle cx="584" cy="982" r="0.9"/>
      <circle cx="22" cy="172" r="1"/>
      <circle cx="1002" cy="192" r="0.9"/>
      <circle cx="312" cy="232" r="1"/>
      <circle cx="688" cy="262" r="0.9"/>
      <circle cx="154" cy="692" r="1"/>
      <circle cx="846" cy="722" r="0.9"/>
      <circle cx="428" cy="472" r="1"/>
      <circle cx="572" cy="512" r="0.9"/>
      <circle cx="102" cy="162" r="1"/>
      <circle cx="898" cy="192" r="0.9"/>
    </g>
  </g>

  <!-- Main logo: only the stem structure + central hub root, NO tip dots -->
  <g transform="translate(176, 176) scale(14)">
    <!-- Main connection lines -->
    <path d="M 22.0 44.0 L 26.0 4.0
             M 23.2 32.0 L 6.0 24.0
             M 23.8 26.0 L 41.0 18.0
             M 24.6 18.0 L 10.0 11.0
             M 25.2 12.0 L 36.0 7.0"
          stroke="url(#lineGradApp)" stroke-width="2.3" stroke-linecap="round" fill="none"/>

    <!-- Inner highlight on lines -->
    <path d="M 22.0 44.0 L 26.0 4.0
             M 23.2 32.0 L 6.0 24.0
             M 23.8 26.0 L 41.0 18.0
             M 24.6 18.0 L 10.0 11.0
             M 25.2 12.0 L 36.0 7.0"
          stroke="#d1fae5" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- Only the central hub (root of the plant) — with soft glow + 3D gradient -->
    <g filter="url(#softGlowApp)" opacity="0.5">
      <circle cx="22.0" cy="44.0" r="6.0" fill="#10b981"/>
    </g>
    <circle cx="22.0" cy="44.0" r="3.8" fill="url(#coreDotApp)"/>
    <circle cx="21.1" cy="43.1" r="1.1" fill="#ecfdf5" opacity="0.9"/>
  </g>
</svg>
