<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Dark base gradient (subtle radial from emerald-tinted center) -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0f2318"/>
      <stop offset="55%" stop-color="#081611"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Emerald glow halo behind logo -->
    <radialGradient id="glowHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#10b981" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <!-- Line gradient -->
    <linearGradient id="lineGradApp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="35%" stop-color="#34d399"/>
      <stop offset="70%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Dot gradient (3D sphere) -->
    <radialGradient id="dotGradApp" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>

    <radialGradient id="coreDotApp" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="35%" stop-color="#6ee7b7"/>
      <stop offset="75%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>

    <filter id="softGlowApp" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (required for iOS opaque icon) -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Ambient halo behind logo -->
  <circle cx="512" cy="512" r="340" fill="url(#glowHalo)"/>

  <!-- Subtle scattered background data-dots for premium feel -->
  <g opacity="0.35">
    <circle cx="180" cy="210" r="5" fill="#34d399"/>
    <circle cx="860" cy="180" r="7" fill="#6ee7b7"/>
    <circle cx="120" cy="480" r="4" fill="#10b981"/>
    <circle cx="900" cy="540" r="5" fill="#34d399"/>
    <circle cx="150" cy="820" r="4" fill="#6ee7b7"/>
    <circle cx="880" cy="830" r="5" fill="#10b981"/>
    <circle cx="280" cy="130" r="3" fill="#34d399"/>
    <circle cx="720" cy="880" r="4" fill="#6ee7b7"/>
    <circle cx="820" cy="320" r="3" fill="#34d399"/>
    <circle cx="240" cy="780" r="4" fill="#10b981"/>
    <circle cx="390" cy="920" r="3" fill="#6ee7b7"/>
    <circle cx="780" cy="620" r="3" fill="#34d399"/>
  </g>

  <!-- Main logo (scaled + centered from 48x48 geometry to fit nicely in 1024x1024 with padding) -->
  <!-- Scale factor: 14, positioning offset to center -->
  <g transform="translate(176, 176) scale(14)">
    <!-- Main connection lines -->
    <path d="M 22.0 44.0 L 26.0 4.0
             M 23.2 32.0 L 6.0 24.0
             M 23.8 26.0 L 41.0 18.0
             M 24.6 18.0 L 10.0 11.0
             M 25.2 12.0 L 36.0 7.0"
          stroke="url(#lineGradApp)" stroke-width="2.3" stroke-linecap="round" fill="none"/>

    <!-- Inner highlight on lines -->
    <path d="M 22.0 44.0 L 26.0 4.0
             M 23.2 32.0 L 6.0 24.0
             M 23.8 26.0 L 41.0 18.0
             M 24.6 18.0 L 10.0 11.0
             M 25.2 12.0 L 36.0 7.0"
          stroke="#d1fae5" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.55"/>

    <!-- Soft outer glow behind dots -->
    <g opacity="0.5" filter="url(#softGlowApp)">
      <circle cx="22.0" cy="44.0" r="6.0" fill="#10b981"/>
      <circle cx="26.0" cy="4.0" r="4.0" fill="#10b981"/>
      <circle cx="6.0" cy="24.0" r="4.5" fill="#10b981"/>
      <circle cx="41.0" cy="18.0" r="4.5" fill="#10b981"/>
      <circle cx="10.0" cy="11.0" r="4.5" fill="#10b981"/>
      <circle cx="36.0" cy="7.0" r="4.5" fill="#10b981"/>
    </g>

    <!-- Main node dots with 3D gradient -->
    <circle cx="22.0" cy="44.0" r="3.8" fill="url(#coreDotApp)"/>
    <circle cx="26.0" cy="4.0" r="2.3" fill="url(#dotGradApp)"/>
    <circle cx="6.0" cy="24.0" r="2.8" fill="url(#dotGradApp)"/>
    <circle cx="41.0" cy="18.0" r="2.8" fill="url(#dotGradApp)"/>
    <circle cx="10.0" cy="11.0" r="2.8" fill="url(#dotGradApp)"/>
    <circle cx="36.0" cy="7.0" r="2.8" fill="url(#dotGradApp)"/>

    <!-- Specular highlights -->
    <circle cx="21.1" cy="43.1" r="1.1" fill="#ecfdf5" opacity="0.9"/>
    <circle cx="25.3" cy="3.3" r="0.55" fill="#ecfdf5" opacity="0.75"/>
    <circle cx="5.3" cy="23.3" r="0.65" fill="#ecfdf5" opacity="0.75"/>
    <circle cx="40.3" cy="17.3" r="0.65" fill="#ecfdf5" opacity="0.75"/>
    <circle cx="9.3" cy="10.3" r="0.65" fill="#ecfdf5" opacity="0.75"/>
    <circle cx="35.3" cy="6.3" r="0.65" fill="#ecfdf5" opacity="0.75"/>
  </g>
</svg>
