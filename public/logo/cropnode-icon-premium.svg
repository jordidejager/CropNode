<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Radial glow halo -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#10b981" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <!-- Emerald gradient for main lines (bright → deep) -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="35%" stop-color="#34d399"/>
      <stop offset="70%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Dot gradient for 3D sphere feel -->
    <radialGradient id="dotGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>

    <!-- Central node (slightly larger, extra bright) -->
    <radialGradient id="coreDotGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="35%" stop-color="#6ee7b7"/>
      <stop offset="75%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>

    <!-- Soft blur glow for dots -->
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for central hub -->
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient halo glow -->
  <circle cx="24" cy="24" r="24" fill="url(#haloGrad)"/>

  <!-- Background scattered data points (like distant stars/telemetry) -->
  <g opacity="0.55">
    <circle cx="7" cy="4" r="0.5" fill="#34d399"/>
    <circle cx="44" cy="6" r="0.7" fill="#6ee7b7"/>
    <circle cx="3" cy="16" r="0.45" fill="#10b981"/>
    <circle cx="46" cy="22" r="0.5" fill="#34d399"/>
    <circle cx="2" cy="35" r="0.4" fill="#6ee7b7"/>
    <circle cx="45" cy="40" r="0.55" fill="#10b981"/>
    <circle cx="14" cy="2" r="0.4" fill="#34d399"/>
    <circle cx="33" cy="44" r="0.5" fill="#6ee7b7"/>
    <circle cx="40" cy="13" r="0.35" fill="#34d399"/>
    <circle cx="9" cy="38" r="0.45" fill="#10b981"/>
    <circle cx="17" cy="46" r="0.4" fill="#6ee7b7"/>
    <circle cx="38" cy="28" r="0.35" fill="#34d399"/>
  </g>

  <!-- Subtle connecting lines between background dots (data mesh) -->
  <g opacity="0.12" stroke="#10b981" fill="none" stroke-width="0.15">
    <line x1="7" y1="4" x2="14" y2="2"/>
    <line x1="44" y1="6" x2="40" y2="13"/>
    <line x1="3" y1="16" x2="2" y2="35"/>
    <line x1="46" y1="22" x2="45" y2="40"/>
    <line x1="38" y1="28" x2="45" y2="40"/>
    <line x1="9" y1="38" x2="17" y2="46"/>
    <line x1="14" y1="2" x2="18" y2="8"/>
  </g>

  <!-- Main neural network lines -->
  <path d="M 22.0 44.0 L 26.0 4.0
           M 23.2 32.0 L 6.0 24.0
           M 23.8 26.0 L 41.0 18.0
           M 24.6 18.0 L 10.0 11.0
           M 25.2 12.0 L 36.0 7.0"
        stroke="url(#lineGrad)" stroke-width="2.0" stroke-linecap="round" fill="none"/>

  <!-- Thin inner highlight on lines for premium shine -->
  <path d="M 22.0 44.0 L 26.0 4.0
           M 23.2 32.0 L 6.0 24.0
           M 23.8 26.0 L 41.0 18.0
           M 24.6 18.0 L 10.0 11.0
           M 25.2 12.0 L 36.0 7.0"
        stroke="#d1fae5" stroke-width="0.4" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Outer glow dots (behind main nodes, softer) -->
  <g opacity="0.45" filter="url(#softGlow)">
    <circle cx="22.0" cy="44.0" r="5.5" fill="#10b981"/>
    <circle cx="26.0" cy="4.0" r="3.5" fill="#10b981"/>
    <circle cx="6.0" cy="24.0" r="4.0" fill="#10b981"/>
    <circle cx="41.0" cy="18.0" r="4.0" fill="#10b981"/>
    <circle cx="10.0" cy="11.0" r="4.0" fill="#10b981"/>
    <circle cx="36.0" cy="7.0" r="4.0" fill="#10b981"/>
  </g>

  <!-- Main node dots with 3D gradient -->
  <circle cx="22.0" cy="44.0" r="3.5" fill="url(#coreDotGrad)" filter="url(#coreGlow)"/>
  <circle cx="26.0" cy="4.0" r="2.0" fill="url(#dotGrad)"/>
  <circle cx="6.0" cy="24.0" r="2.5" fill="url(#dotGrad)"/>
  <circle cx="41.0" cy="18.0" r="2.5" fill="url(#dotGrad)"/>
  <circle cx="10.0" cy="11.0" r="2.5" fill="url(#dotGrad)"/>
  <circle cx="36.0" cy="7.0" r="2.5" fill="url(#dotGrad)"/>

  <!-- Inner highlights (specular shine) -->
  <circle cx="21.2" cy="43.2" r="0.9" fill="#ecfdf5" opacity="0.85"/>
  <circle cx="25.4" cy="3.4" r="0.45" fill="#ecfdf5" opacity="0.7"/>
  <circle cx="5.4" cy="23.4" r="0.55" fill="#ecfdf5" opacity="0.7"/>
  <circle cx="40.4" cy="17.4" r="0.55" fill="#ecfdf5" opacity="0.7"/>
  <circle cx="9.4" cy="10.4" r="0.55" fill="#ecfdf5" opacity="0.7"/>
  <circle cx="35.4" cy="6.4" r="0.55" fill="#ecfdf5" opacity="0.7"/>
</svg>
